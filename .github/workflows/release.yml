name: Release

on:
  push:
    tags:
      - 'release-*'

jobs:
  build-mac-m1:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build macOS DMG
        run: ./gradlew jpackage

      - uses: actions/upload-artifact@v6
        with:
          name: macos-m1.dmg
          path: app/build/jpackage/*.dmg

  build-mac-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build macOS DMG
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: ./gradlew jpackage

      - uses: actions/upload-artifact@v6
        with:
          name: macos-intel.dmg
          path: app/build/jpackage/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build Windows MSI
        run: ./gradlew jpackage -PinstallerType=msi

      - name: Save MSI
        shell: bash
        run: cp app/build/jpackage/*.msi app/build/DemoPublish.msi

      - uses: actions/upload-artifact@v6
        with:
          name: windows-installers
          path: |
            app/build/DemoPublish.msi

  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build Windows EXE
        run: ./gradlew jpackage -PinstallerType=exe --rerun-tasks

      - uses: actions/upload-artifact@v6
        with:
          name: windows-exe
          path: |
            app/build/jpackage/*.exe

  release:
    needs: [build-mac-m1, build-mac-intel, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-installers/*.msi
            artifacts/windows-exe/*.exe
