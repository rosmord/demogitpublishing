name: Release

on:
  push:
    tags:
      - 'release-*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build macOS DMG
        run: ./gradlew jpackage

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: app/build/jpackage/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build Windows MSI
        run: ./gradlew jpackage -PinstallerType=msi

      - name: Save MSI
        shell: bash
        run: cp app/build/jpackage/*.msi app/build/DemoPublish.msi

      - name: Build Windows EXE
        run: ./gradlew jpackage -PinstallerType=exe --rerun-tasks

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            app/build/DemoPublish.msi
            app/build/jpackage/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-installers/*.msi
            artifacts/windows-installers/*.exe
